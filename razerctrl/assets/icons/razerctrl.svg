<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#000000"/>
  
  <!-- Razer-style Snakes (Abstract) -->
  <g transform="translate(128, 128) scale(0.8)">
    <path d="M-60,-80 C-80,-60 -80,-20 -60,0 C-40,20 -40,60 -60,80" stroke="#44d62c" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M60,-80 C80,-60 80,-20 60,0 C40,20 40,60 60,80" stroke="#44d62c" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M0,-100 C-20,-80 -20,-40 0,-20 C20,0 20,40 0,60" stroke="#44d62c" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- C.T.R.L Text -->
  <text x="128" y="160" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="#44d62c" text-anchor="middle" letter-spacing="4">
    C.T.R.L
  </text>
  
  <!-- Glow effect -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g filter="url(#glow)">
    <path d="M40,40 L216,40 L216,216 L40,216 Z" fill="none" stroke="#44d62c" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
