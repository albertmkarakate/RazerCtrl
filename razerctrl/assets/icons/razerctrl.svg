<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121212;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="256" height="256" rx="54" fill="url(#bgGrad)"/>
  
  <!-- Razer-style Snakes (Triple Headed) -->
  <g transform="translate(128, 105) scale(1.2)" filter="url(#glow)">
    <!-- Central Snake -->
    <path d="M0,-65 C-15,-40 -15,-10 0,20 C10,40 10,60 0,80" stroke="#44d62c" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M0,20 L-10,10 M0,20 L10,10" stroke="#44d62c" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Left Snake -->
    <path d="M-15,-55 C-45,-35 -65,-5 -45,25 C-35,40 -15,50 -10,65" stroke="#44d62c" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M-45,25 L-50,15 M-45,25 L-35,20" stroke="#44d62c" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Right Snake -->
    <path d="M15,-55 C45,-35 65,-5 45,25 C35,40 15,50 10,65" stroke="#44d62c" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M45,25 L50,15 M45,25 L35,20" stroke="#44d62c" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- C.T.R.L Text -->
  <text x="128" y="215" font-family="monospace, Courier New, serif" font-weight="900" font-size="44" fill="#44d62c" text-anchor="middle" letter-spacing="8" filter="url(#glow)">
    C.T.R.L
  </text>
  
  <!-- Outer Glow Border -->
  <rect x="12" y="12" width="232" height="232" rx="50" fill="none" stroke="#44d62c" stroke-width="2" opacity="0.15"/>
</svg>
